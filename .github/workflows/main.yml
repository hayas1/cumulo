name: Main

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
        with:
          components: rustfmt, clippy
      - run: cargo test --all --release

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
      - name: Install trunk
        run: curl -fsL https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build
        working-directory: cumulo-web
        run: trunk build --release --public-url /cumulo/
        env:
          CUMULO_BASE_PATH: /cumulo
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cumulo-web/dist

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  versions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      expected-git-tag: ${{ steps.versions.outputs.expected-git-tag }}
      should-release: ${{ steps.versions.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4
      - id: versions
        uses: ./.github/actions/versions
      - name: Assert Cargo.toml and manifest.json versions match
        run: |
          if [ "${{ steps.versions.outputs.crate-version }}" != "${{ steps.versions.outputs.manifest-version }}" ]; then
            echo "Cargo.toml and manifest.json versions differ" >&2
            exit 1
          fi

  release:
    needs: [test, versions]
    if: needs.versions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
      - name: Install trunk
        run: curl -fsL https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build
        working-directory: cumulo-extension
        run: trunk build --release
      - name: Package unpacked extension
        working-directory: cumulo-extension/dist
        run: zip -r "$GITHUB_WORKSPACE/cumulo-extension-${{ needs.versions.outputs.expected-git-tag }}.zip" .
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.versions.outputs.expected-git-tag }}" \
            cumulo-extension-*.zip \
            --generate-notes
