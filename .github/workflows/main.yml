name: Main

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
        with:
          components: rustfmt, clippy
      - run: cargo test --all --release

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
      - name: Install trunk
        run: curl -fsL https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build
        # --public-url は trunk のアセット書き換え用。CUMULO_BASE_PATH は同じ prefix を
        # cargo ビルドへ渡し leptos_router の base に使う（trunk は public-url を cargo へ渡さない）。
        working-directory: cumulo-web
        run: trunk build --release --public-url /cumulo/
        env:
          CUMULO_BASE_PATH: /cumulo
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cumulo-web/dist

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  versions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      expected-git-tag: ${{ steps.versions.outputs.expected-git-tag }}
      should-release: ${{ steps.versions.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4
      - id: versions
        uses: ./.github/actions/versions
      # release version の正は Cargo.toml。manifest.json は Chrome 要求の重複値なので、
      # 生成せず一致だけ検証し、ズレたまま release されるのを止める（pullrequest.yml と同じ検証）。
      - name: Assert Cargo.toml and manifest.json versions match
        run: |
          if [ "${{ steps.versions.outputs.crate-version }}" != "${{ steps.versions.outputs.manifest-version }}" ]; then
            echo "Cargo.toml and manifest.json versions differ" >&2
            exit 1
          fi

  release:
    needs: [test, versions]
    if: needs.versions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
      - name: Install trunk
        run: curl -fsL https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build
        # 拡張の Trunk.toml は public_url="./" 固定なので、cumulo-web 側の --public-url は不要。
        working-directory: cumulo-extension
        run: trunk build --release
      - name: Package unpacked extension
        working-directory: cumulo-extension/dist
        run: zip -r "$GITHUB_WORKSPACE/cumulo-extension-${{ needs.versions.outputs.expected-git-tag }}.zip" .
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        # gh release create で tag 作成・zip 添付・ノート生成まで完結する。
        # --generate-notes は「Generate release notes」ボタン相当（前回タグ以降の PR/commit から生成）。
        run: |
          gh release create "${{ needs.versions.outputs.expected-git-tag }}" \
            cumulo-extension-*.zip \
            --generate-notes
