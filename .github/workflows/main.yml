name: Main

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
        with:
          components: rustfmt, clippy
      - run: cargo test --all --release

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
      - name: Install trunk
        run: cargo install trunk
      - name: Build
        # --public-url は trunk のアセット書き換え用。CUMULO_BASE_PATH は同じ prefix を
        # cargo ビルドへ渡し leptos_router の base に使う（trunk は public-url を cargo へ渡さない）。
        run: cd cumulo-web && trunk build --release --public-url /cumulo/
        env:
          CUMULO_BASE_PATH: /cumulo
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cumulo-web/dist

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
