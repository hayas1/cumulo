name: Release

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  versions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      expected-git-tag: ${{ steps.versions.outputs.expected-git-tag }}
      should-release: ${{ steps.versions.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4
      - id: versions
        uses: ./.github/actions/versions
      # pullrequest.yml と同じ検証を release 経路にも安全網として置く。
      - name: Assert Cargo.toml and manifest.json versions match
        run: |
          if [ "${{ steps.versions.outputs.crate-version }}" != "${{ steps.versions.outputs.manifest-version }}" ]; then
            echo "Cargo.toml and manifest.json versions differ" >&2
            exit 1
          fi

  release:
    needs: versions
    if: needs.versions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-cargo
      - name: Install trunk
        run: curl -fsL https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build
        # 拡張の Trunk.toml は public_url="./" 固定なので、cumulo-web 側の --public-url は不要。
        run: cd cumulo-extension && trunk build --release
      - name: Package unpacked extension
        run: cd cumulo-extension/dist && zip -r "$GITHUB_WORKSPACE/cumulo-extension-${{ needs.versions.outputs.expected-git-tag }}.zip" .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.versions.outputs.expected-git-tag }}
          files: cumulo-extension-*.zip
