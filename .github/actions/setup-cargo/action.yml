name: Setup Cargo
description: Install the Rust toolchain and restore the cargo build cache.

inputs:
  components:
    description: 'Rust toolchain components to install'
    default: ''
  cache-suffix:
    description: 'Namespaces the cargo cache so builds with different features do not evict each other'
    default: 'default'

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
        targets: wasm32-unknown-unknown
    - name: Cargo home
      id: cargo-home
      shell: bash
      run: echo "path=${CARGO_HOME:-~/.cargo}" >>"$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: |
          target
          ${{ steps.cargo-home.outputs.path }}
        key: cargo-${{ inputs.cache-suffix }}-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          cargo-${{ inputs.cache-suffix }}-
