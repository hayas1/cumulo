<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cumulo</title>
    <link data-trunk rel="css" href="public/styles.css" />
    <link data-trunk rel="copy-file" href="public/map.js" />
    <link data-trunk rel="copy-file" href="public/404.html" />
    <link data-trunk rel="icon" href="public/favicon.svg" type="image/svg+xml" />
    <script>
      // Restore URL after GitHub Pages 404 redirect (see public/404.html)
      // e.g. /cumulo/?/facet -> /cumulo/facet
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="map.js"></script>
  </head>
  <body></body>
</html>
